[tools]
go = "1.26"
"go:github.com/pressly/goose/v3/cmd/goose" = "3.26"
"go:github.com/sqlc-dev/sqlc/cmd/sqlc" = "1.30"
gofumpt = "0.9"
golangci-lint = "2.11"
goreleaser = "2.15"

[env]
DEBUG = true

[tasks.build]
description = "Build the fman binary"
run = "go build -o bin/fman ./cmd/tui"

[tasks.test]
description = "Run tests"
run = "go test ./..."

[tasks.test-verbose]
description = "Run tests with verbose output"
run = "go test -v -count=1 ./..."

[tasks.lint]
description = "Run golangci-lint"
run = "golangci-lint run"

[tasks.fmt]
description = "Format code with gofumpt"
run = "gofumpt -w ."

[tasks.fmt-check]
description = "Check code formatting without modifying files (for CI)"
run = """
#!/usr/bin/env bash
set -euo pipefail
files=$(gofumpt -l .)
if [ -n "$files" ]; then
  echo "The following files need formatting (run: mise run fmt):"
  echo "$files"
  exit 1
fi
echo "All files are properly formatted."
"""

[tasks.sqlc]
description = "Regenerate sqlc code from SQL schema"
run = "sqlc generate"

[tasks.ci]
description = "Run the full CI check suite (fmt-check, lint, test)"
depends = ["fmt-check", "lint", "test"]

[tasks.release]
description = "Create a release with goreleaser (requires a git tag)"
run = "goreleaser release --clean"

[tasks.release-snapshot]
description = "Build a snapshot release locally without publishing"
run = "goreleaser release --snapshot --clean"

[tasks.tag]
description = "Bump version, create an annotated git tag, and push to trigger a release"
usage = 'arg "<bump>" help="Version component to bump" { choices "patch" "minor" "major" }'
run = """
#!/usr/bin/env bash
set -euo pipefail

bump="${1:-}"
if [[ "$bump" != "patch" && "$bump" != "minor" && "$bump" != "major" ]]; then
  echo "Usage: mise run tag <patch|minor|major>"
  exit 1
fi

# Ensure working tree is clean.
if [ -n "$(git status --porcelain)" ]; then
  echo "Error: working tree is not clean. Commit or stash changes first."
  exit 1
fi

# Warn if not on main.
branch=$(git rev-parse --abbrev-ref HEAD)
if [ "$branch" != "main" ]; then
  echo "Warning: not on main branch (currently on: $branch)"
  read -r -p "Continue anyway? [y/N] " reply
  [[ "$reply" =~ ^[Yy]$ ]] || exit 1
fi

# Compute next version from the latest tag.
current=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
IFS='.' read -r major minor patch <<< "${current#v}"
case "$bump" in
  major) major=$((major + 1)); minor=0; patch=0 ;;
  minor) minor=$((minor + 1)); patch=0 ;;
  patch) patch=$((patch + 1)) ;;
esac
next="v${major}.${minor}.${patch}"

echo "Current: $current"
echo "Next:    $next"
read -r -p "Create and push tag $next? [y/N] " reply
[[ "$reply" =~ ^[Yy]$ ]] || exit 1

git tag -a "$next" -m "Release $next"
git push origin "$next"
echo "Tag $next pushed — release workflow will start shortly."
"""

[tasks.run-tui]
description = "Run the TUI"
run = "go run cmd/tui/main.go"

[tasks.goose-create]
description = "Create a new SQL migration file"
dir = "db/migration/"
usage = '''
arg "<name>" help="Migration file name"
arg "<type>" help="Migration file type" default="sql" { choices "sql" "go" }
'''
run = "goose -s create ${usage_name} ${usage_type?}"

[tasks.goose-up]
description = "Perform UP SQL migrations"
usage = '''
flag "--dir <migrations_dir>" {
    help "Directory with SQL migration files"
    default "db/migration/"
}
arg "<driver>" help="SQL driver" {
    choices "sqlite" "postgres"
    default "sqlite"
}
arg "<path>" help="Database path or connection string" {
    default "data.db"
}
'''
run = "goose -dir ${usage_dir?} ${usage_driver?} ${usage_path?} up"

[tasks.goose-down]
description = "Perform DOWN SQL migrations"
usage = '''
flag "--dir <migrations_dir>" {
    help "Directory with SQL migration files"
    default "db/migration/"
}
arg "<driver>" help="SQL driver" {
    choices "sqlite" "postgres"
    default "sqlite"
}
arg "<path>" help="Database path or connection string" {
    default "data.db"
}
'''
run = "goose -dir ${usage_dir?} ${usage_driver?} ${usage_path?} down"
