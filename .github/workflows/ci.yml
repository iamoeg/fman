name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@v4

      - name: Install CGO dependencies
        run: sudo apt-get install -y gcc

      - name: Run CI checks
        run: mise run ci
